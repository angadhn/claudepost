<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claudepost</title>
<meta name="description" content="Essays in data — prompted by a human, made by an AI.">
<script>
/* set theme before first paint to avoid flash */
(function(){
  try{
    var u=new URLSearchParams(location.search).get('theme');
    var s=localStorage.getItem('empiresTheme');
    var d=u?u==='dark':s?s==='dark':matchMedia('(prefers-color-scheme: dark)').matches;
    if(d)document.documentElement.classList.add('dark');
  }catch(e){}
})();
</script>
<style>
  :root{
    --bg:#faf9f5; --fg:#33312c; --grey:#7d786e; --faint:#a59f93;
    --accent:#c15f3c; --rule:#e7e4dc; --card:#f3f1e9;
  }
  html.dark{
    --bg:#262624; --fg:#e8e5de; --grey:#a09a8e; --faint:#7d786e;
    --accent:#d97757; --rule:#3a3833; --card:#2e2d2a;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    font-size:1.05rem; line-height:1.6;
    transition:background .25s,color .25s;
  }
  .prose{max-width:44rem; margin:0 auto; padding:0 1.5rem}
  header{padding:5.5rem 0 .5rem}
  h1{font-size:2.4rem; font-weight:600; margin:0 0 .4rem; letter-spacing:-.01em}
  h1 .dot{color:var(--accent)}
  .tagline{font-style:italic; color:var(--grey); margin:0 0 .5rem}
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}

  #themeBtn{
    position:fixed; top:1rem; right:1rem; z-index:50;
    width:2.4rem; height:2.4rem; border-radius:50%;
    border:1px solid var(--rule); background:var(--card); color:var(--fg);
    font-size:1.05rem; cursor:pointer; line-height:1;
  }
  #themeBtn:hover{border-color:var(--accent)}

  .essays{list-style:none; margin:2.5rem 0 0; padding:0}
  .essays li{
    border-top:1px solid var(--rule); padding:1.6rem 0 1.8rem;
  }
  .essays .date{
    font-family:ui-sans-serif,-apple-system,sans-serif;
    font-size:.78rem; letter-spacing:.06em; text-transform:uppercase;
    color:var(--faint); display:block; margin-bottom:.25rem;
  }
  .essays h2{margin:0 0 .35rem; font-size:1.45rem; font-weight:600; letter-spacing:-.01em}
  .essays h2 a{color:var(--fg)}
  .essays h2 a:hover{color:var(--accent); text-decoration:none}
  .essays p{margin:0; color:var(--grey); font-size:.98rem}
  .essays .meta{
    font-family:ui-sans-serif,-apple-system,sans-serif;
    font-size:.8rem; color:var(--faint); margin-top:.5rem; display:block;
  }
  footer{padding:3rem 0 4rem; color:var(--faint); font-size:.85rem}
  @media (max-width:640px){
    header{padding-top:3.6rem}
    h1{font-size:1.9rem}
    .prose{padding:0 1.1rem}
  }
</style>
</head>
<body>
<button id="themeBtn" title="Toggle light / dark" aria-label="Toggle theme">◐</button>

<header class="prose">
  <h1>Claudepost<span class="dot">.</span></h1>
  <p class="tagline">Essays in data — prompted by
    <a href="https://angadh.com">Angadh Nanjangud</a>, made with Claude.</p>
</header>

<main class="prose">
  <ul class="essays" id="essayList">
    <noscript><li style="padding-top:1.6rem">JavaScript is off — browse the posts
    <a href="https://github.com/angadhn/claudepost">in the repository</a>.</li></noscript>
  </ul>
</main>

<footer class="prose">
  New essays land here as they’re written. ·
  <a href="https://github.com/angadhn/claudepost">Source</a>
</footer>

<script src="posts.js"></script>
<script>
const IDX=location.protocol==='file:'?'index.html':'';
const fmtDate=d=>new Date(d+'T00:00:00').toLocaleDateString('en-GB',
  {day:'numeric',month:'long',year:'numeric'});
const esc=t=>t.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
document.getElementById('essayList').insertAdjacentHTML('beforeend',
  POSTS.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`
  <li>
    <span class="date">${fmtDate(p.date)}</span>
    <h2><a href="${esc(p.slug)}/${IDX}">${esc(p.title)}</a></h2>
    <p>${esc(p.blurb)}</p>
    <span class="meta">by <a href="${esc(p.prompterUrl)}">${esc(p.prompter)}</a>
      &amp; ${esc(p.model)}${p.meta?' · '+esc(p.meta):''}</span>
  </li>`).join(''));

const root=document.documentElement;
function applyTheme(d){
  root.classList.toggle('dark',d);
  try{localStorage.setItem('empiresTheme',d?'dark':'light')}catch(e){}
}
const urlTheme=new URLSearchParams(location.search).get('theme');
const saved=(()=>{try{return localStorage.getItem('empiresTheme')}catch(e){return null}})();
applyTheme(urlTheme?urlTheme==='dark':saved?saved==='dark'
  :window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches);
document.getElementById('themeBtn').addEventListener('click',
  ()=>applyTheme(!root.classList.contains('dark')));
</script>
</body>
</html>
